<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CineMax</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

    <div class="login-container">

        <h1>CineMax</h1>

        <form id="loginForm">

            <input type="email"
                   id="loginEmail"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   id="loginPassword"
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Login
            </button>

            <p style="text-align:center; margin-top:20px; color:white;">
                New User?

                <a href="register.html" style="color:red;">
                    Register Here
                </a>
            </p>

        </form>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
