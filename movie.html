<script>

    document.getElementById("movieTitle")
        .innerText =
        localStorage.getItem("movieTitle");

    document.getElementById("movieImage")
        .src =
        localStorage.getItem("movieImage");

    document.getElementById("movieInfo")
        .innerText =
        localStorage.getItem("movieInfo");

    document.getElementById("movieDescription")
        .innerText =
        localStorage.getItem("movieDescription");

        const trailer =
localStorage.getItem(
"movieTrailer"
);

document.getElementById(
"movieTrailer"
).src = trailer;

    document.querySelector(".movie-banner")
        .style.backgroundImage =
        `url(${localStorage.getItem("movieImage")})`;

    const currentMovie =
        localStorage.getItem("movieTitle");

    const recommendCards =
        document.querySelectorAll(".recommend-card");

    recommendCards.forEach(function(card){

        const movieName =
            card.dataset.title;

        if(
            movieName.toLowerCase()
            ===
            currentMovie.toLowerCase()
        ){

            card.style.display = "none";
        }

        card.addEventListener("click", function(){

            openMovie(

    card.dataset.title,

    card.dataset.image,

    card.dataset.info,

    card.dataset.description,

    card.dataset.trailer

);

        });

    });

    const watchButtons =
    document.querySelectorAll(".recommend-watch-btn");

watchButtons.forEach(function(button){

    button.addEventListener("click", function(event){

        event.stopPropagation();

        const card =
            button.parentElement;

        openMovie(

    card.dataset.title,

    card.dataset.image,

    card.dataset.info,

    card.dataset.description,

    card.dataset.trailer

);

    });

});

function loadReviews(){

    const movieTitle =

    localStorage.getItem(
    "movieTitle"
    );

    fetch(

    "https://cinemax-1-5ql6.onrender.com/reviews/"
    + movieTitle

    )

    .then(response => response.json())

    .then(reviews => {

        const container =

        document.getElementById(
        "reviewsContainer"
        );

        container.innerHTML = "";

        reviews.forEach(function(review){

            container.innerHTML += `

            <div class="review-card">

                <h3>

                    ${review.username}

                </h3>

                <p>

                    Rating:
                    ${review.rating} ⭐

                </p>

                <p>

    ${review.comment}

</p>

<button class="delete-btn"

onclick="deleteReview(
${review.id}
)">

    🗑 Delete

</button>

            </div>

            `;
        });

    });

}

function submitReview(){

    const review = {

        username:
        localStorage.getItem(
        "username"
        ),

        movieTitle:
        localStorage.getItem(
        "movieTitle"
        ),

        rating:
        document.getElementById(
        "rating"
        ).value,

        comment:
        document.getElementById(
        "reviewComment"
        ).value
    };

    fetch(

    "https://cinemax-1-5ql6.onrender.com/reviews/add",

    {

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify(review)
    })

    .then(response => response.text())

    .then(data => {

        loadReviews();

        document.getElementById(
        "reviewComment"
        ).value = "";
    });

}
function deleteReview(id){

    fetch(

    "https://cinemax-1-5ql6.onrender.com/reviews/delete/"
    + id,

    {

        method:"DELETE"
    })

    .then(response => response.text())

    .then(data => {

        loadReviews();
    });

}

function playTrailer(){

    const trailerContainer =
    document.getElementById(
    "trailerContainer"
    );

    const trailer =
    document.getElementById(
    "movieTrailer"
    );

    const trailerLink =
    localStorage.getItem(
    "movieTrailer"
    );
    let continueMovies =

JSON.parse(

localStorage.getItem(
"continueMovies"
)

) || [];

continueMovies =

continueMovies.filter(function(movie){

    return movie.title !==

    localStorage.getItem(
    "movieTitle"
    );
});

continueMovies.unshift({

    title:
    localStorage.getItem(
    "movieTitle"
    ),

    image:
    localStorage.getItem(
    "movieImage"
    )
});

localStorage.setItem(

"continueMovies",

JSON.stringify(continueMovies)

);

    trailerContainer.style.display =
    "block";

    trailer.src =
    trailerLink + "?autoplay=1";

    trailerContainer.scrollIntoView({

        behavior:"smooth"
    });
}

function toggleReviews(){

    const popup =

    document.getElementById(
    "reviewPopup"
    );

    if(

    popup.style.display ===
    "block"

    ){

        popup.style.display =
        "none";
    }

    else{

        popup.style.display =
        "block";
    }
}
loadReviews();

</script>
