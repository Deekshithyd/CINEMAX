<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Watchlist</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body class="movie-page">
    <div class="global-back-btn"

onclick="history.back()">

←

</div>

<h1 class="recommend-title">
    ❤️ My Watchlist
</h1>

<div class="recommend-container"
id="watchlistContainer">

</div>

<script>

fetch("http://localhost:8080/watchlist/all")

.then(response => response.json())

.then(watchlist => {

    const container =
    document.getElementById(
    "watchlistContainer"
    );

    if(watchlist.length === 0){

        container.innerHTML =
        "<h2>No Movies In Watchlist</h2>";
    }

    watchlist.forEach(function(movie){

        container.innerHTML += `

        <div class="watchlist-card">

            <img src="${movie.movieImage}">

            <p>${movie.movieTitle}</p>

            <button class="watchlist-watch-btn"

            onclick="openWatchMovie(
            '${movie.movieTitle}',
            '${movie.movieImage}'
            )">

                ▶ Watch

            </button>

            <button class="delete-btn"

            onclick="removeWatchlistMovie(
            ${movie.id}
            )">

                🗑 Delete

            </button>

        </div>

        `;
    });

});

function openWatchMovie(title, image){

    localStorage.setItem(
        "movieTitle",
        title
    );

    localStorage.setItem(
        "movieImage",
        image
    );

    window.location.href =
        "movie.html";
}

function removeWatchlistMovie(id){

    fetch(

        "http://localhost:8080/watchlist/delete/" + id,

        {

            method:"DELETE"
        }

    )

    .then(response => response.text())

    .then(data => {

        location.reload();
    });
}

</script>

</body>

</html>
